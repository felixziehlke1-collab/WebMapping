        let currentData = [...rawData];
        let sortDirections = {};

        const columns = Object.keys(rawData[0]);
        const sortRow = document.getElementById('header-sort-row');
        const filterRow = document.getElementById('header-filter-row');
        const tbody = document.getElementById('table-body');

        // Kopfzeile aufbauen
        columns.forEach(col => {
            // Sortier-Header
            const thSort = document.createElement('th');
            thSort.innerHTML = `${col} <span class="sort-icon">↕</span>`;
            thSort.addEventListener('click', () => sortTable(col));
            sortRow.appendChild(thSort);
            sortDirections[col] = true; // true = aufsteigend

            // Filter-Header
            const thFilter = document.createElement('th');
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Filtern...';
            input.dataset.column = col;
            input.addEventListener('input', filterTable);
            thFilter.appendChild(input);
            filterRow.appendChild(thFilter);
        });

        // Tabelle rendern
        function renderTable(data) {
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = row[col];
                    // Formatierungshilfe für reine Zahlenwerte
                    if(typeof row[col] === 'number' && !col.includes('ID')) {
                        td.classList.add('num-cell');
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        // Excel-Sortierfunktion
        function sortTable(column) {
            const asc = sortDirections[column];
            sortDirections[column] = !asc;

            // Sortier-Icons zurücksetzen und aktuelles anpassen
            document.querySelectorAll('.sort-icon').forEach(icon => icon.textContent = '↕');
            const clickedTh = Array.from(sortRow.children)[columns.indexOf(column)];
            clickedTh.querySelector('.sort-icon').textContent = asc ? '▲' : '▼';

            currentData.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];
                
                if (typeof valA === 'string') {
                    return asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                } else {
                    return asc ? valA - valB : valB - valA;
                }
            });
            renderTable(currentData);
        }

        // Excel-Filterfunktion
        function filterTable() {
            const inputs = Array.from(filterRow.querySelectorAll('input'));
            let filtered = [...rawData];

            inputs.forEach(input => {
                const query = input.value.toLowerCase().trim();
                const col = input.dataset.column;

                if (query !== '') {
                    filtered = filtered.filter(row => {
                        return String(row[col]).toLowerCase().includes(query);
                    });
                }
            });

            currentData = filtered;
            renderTable(currentData);
        }

        // Initiale Tabellenausgabe
        renderTable(currentData);
    </script>
